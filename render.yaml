services:
  - type: web
    name: cyon-jalingo
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input
    startCommand: python manage.py migrate && gunicorn cyon_project.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
    disk:
      name: cyon-data
      mountPath: /data
      sizeGB: 1
