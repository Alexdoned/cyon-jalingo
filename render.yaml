services:
  - type: web
    name: cyon-jalingo
    env: python
    region: oregon
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn cyon_project.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: cyon-db
          property: connectionString

databases:
  - name: cyon-db
    databaseName: cyon
    user: cyon_user
    plan: free
