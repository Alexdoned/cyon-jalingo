services:
  - type: web
    name: cyon-jalingo
    env: node
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: DATABASE_URL
        fromDatabase:
          name: cyon-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

databases:
  - name: cyon-db
    databaseName: cyon
    user: cyon_user
    plan: free
